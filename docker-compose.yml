# docker-compose.yml
version: "3.8"

services:
  # PostgreSQL Database
  db:
    image: postgres:15
    container_name: customer360_db
    restart: always

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5


  # FastAPI Backend
  backend:
    build: .
    container_name: customer360_backend

    command: >
      sh -c "
      echo 'Waiting for database...' &&
      sleep 5 &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy

    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

    volumes:
      - .:/app


  # Streamlit Frontend
  frontend:
    build: .
    container_name: customer360_frontend

    command: >
      streamlit run streamlit_app/app.py
      --server.port 8501
      --server.address 0.0.0.0

    ports:
      - "8501:8501"

    depends_on:
      - backend

    environment:
      API_BASE: http://backend:8000

    volumes:
      - .:/app


# Persistent Volume for PostgreSQL data
volumes:
  postgres_data: